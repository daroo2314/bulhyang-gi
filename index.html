    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        // Framer Motion global check - more robust
        const motion = (window.Motion && window.Motion.motion) || (window.FramerMotion && window.FramerMotion.motion) || null;
        const AnimatePresence = (window.Motion && window.Motion.AnimatePresence) || (window.FramerMotion && window.FramerMotion.AnimatePresence) || null;

        if (!motion) {
            console.error("Framer Motion failed to load. Check CDNs or internet connection.");
        }

        // Lucide Icon Component - more robust
        const Icon = ({ name, className, fill = "none", strokeWidth = 2 }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    try {
                        window.lucide.createIcons({
                            attrs: { 
                                class: className, 
                                fill: fill,
                                stroke: 'currentColor',
                                'stroke-width': strokeWidth
                            },
                            nameAttr: 'data-lucide'
                        });
                    } catch (e) {
                        console.warn("Lucide icon creation failed:", e);
                    }
                }
            }, [name, className, fill, strokeWidth]);

            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        // Icon Aliases
        const Flame = (p) => <Icon name="flame" {...p} />;
        const TrendingUp = (p) => <Icon name="trending-up" {...p} />;
        const Users = (p) => <Icon name="users" {...p} />;
        const DollarSign = (p) => <Icon name="dollar-sign" {...p} />;
        const CheckCircle2 = (p) => <Icon name="check-circle-2" {...p} />;
        const ArrowRight = (p) => <Icon name="arrow-right" {...p} />;
        const Award = (p) => <Icon name="award" {...p} />;
        const ChevronRight = (p) => <Icon name="chevron-right" {...p} />;
        const Menu = (p) => <Icon name="menu" {...p} />;
        const X = (p) => <Icon name="x" {...p} />;
        const Phone = (p) => <Icon name="phone-call" {...p} />;
        const MessageCircle = (p) => <Icon name="message-circle" {...p} />;
        const MessageSquare = (p) => <Icon name="message-square" {...p} />;

        const SectionWrapper = ({ children, className = "", id = "" }) => (
            <section id={id} className={`py-20 px-6 md:py-32 md:px-12 overflow-hidden ${className}`}>
                <div className="max-w-7xl mx-auto">
                    {children}
                </div>
            </section>
        );

        const FadeIn = ({ children, delay = 0, className = "", direction = "up", animateOnLoad = false }) => {
            if (!motion) return <div className={className}>{children}</div>;

            const variants = {
                up: { opacity: 0, y: 30 },
                down: { opacity: 0, y: -30 },
                left: { opacity: 0, x: 30 },
                right: { opacity: 0, x: -30 },
                none: { opacity: 0 }
            };

            return (
                <motion.div
                    initial={variants[direction]}
                    animate={animateOnLoad ? { opacity: 1, x: 0, y: 0 } : undefined}
                    whileInView={!animateOnLoad ? { opacity: 1, x: 0, y: 0 } : undefined}
                    viewport={{ once: false, margin: "0px 0px -50px 0px" }}
                    transition={{ duration: 0.8, delay, ease: [0.21, 0.47, 0.32, 0.98] }}
                    className={className}
                >
                    {children}
                </motion.div>
            );
        };

        const Marquee = ({ text, className = "" }) => (
            <div className={`overflow-hidden whitespace-nowrap flex ${className}`}>
                <motion.div
                    animate={{ x: ["0%", "-50%"] }}
                    transition={{ duration: 30, repeat: Infinity, ease: "linear" }}
                    className="flex gap-8 items-center"
                >
                    {[...Array(20)].map((_, i) => (
                        <span key={i} className="text-8xl md:text-[12rem] font-display text-outline uppercase select-none">
                            {text}
                        </span>
                    ))}
                </motion.div>
            </div>
        );

        const RevealText = ({ text, delay = 0, className = "", animateOnLoad = false }) => {
            if (!motion) return <span className={className}>{text}</span>;
            
            const words = text.split(" ");
            
            const container = {
                hidden: { opacity: 1 },
                visible: {
                    opacity: 1,
                    transition: {
                        staggerChildren: 0.03,
                        delayChildren: delay,
                    }
                }
            };
            
            const child = {
                hidden: { y: "100%", opacity: 0 },
                visible: {
                    y: 0,
                    opacity: 1,
                    transition: {
                        duration: 0.5,
                        ease: [0.21, 0.47, 0.32, 0.98]
                    }
                }
            };

            return (
                <motion.span 
                    variants={container}
                    initial="hidden"
                    animate={animateOnLoad ? "visible" : undefined}
                    whileInView={!animateOnLoad ? "visible" : undefined}
                    viewport={{ once: true, margin: "0px 0px -20px 0px" }}
                    className={`inline-flex flex-wrap gap-x-[0.25em] ${className}`}
                >
                    {words.map((word, wordIdx) => (
                        <span key={wordIdx} className="inline-block whitespace-nowrap overflow-hidden py-2 -my-2">
                            {word.split("").map((char, charIdx) => (
                                <motion.span
                                    key={charIdx}
                                    variants={child}
                                    className="inline-block"
                                    style={{ backfaceVisibility: "hidden" }}
                                >
                                    {char}
                                </motion.span>
                            ))}
                        </span>
                    ))}
                </motion.span>
            );
        };

        const Counter = ({ value, duration = 0.6, delay = 0, className = "" }) => {
            const [count, setCount] = useState(0);
            const [isInView, setIsInView] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                // Always show on mobile or if IntersectionObserver is missing
                if (!window.IntersectionObserver || window.innerWidth < 768) {
                    setIsInView(true);
                    return;
                }

                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsInView(true);
                        }
                    },
                    { threshold: 0.01 }
                );

                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);

            useEffect(() => {
                if (!isInView) return;
                
                let startTimestamp = null;
                let requestRef = null;

                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / (duration * 1000), 1);
                    setCount(Math.floor(progress * value));
                    if (progress < 1) {
                        requestRef = window.requestAnimationFrame(step);
                    }
                };
                
                const timeout = setTimeout(() => {
                    requestRef = window.requestAnimationFrame(step);
                }, delay * 1000);
                
                return () => {
                    clearTimeout(timeout);
                    if (requestRef) window.cancelAnimationFrame(requestRef);
                };
            }, [value, duration, delay, isInView]);

            return <span ref={ref} className={className}>{count}</span>;
        };

        function App() {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isMobileFormOpen, setIsMobileFormOpen] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                const form = e.currentTarget;
                const formData = new FormData(form);
                
                setIsSubmitting(true);
                
                try {
                    const response = await fetch("https://formspree.io/f/mzdkwrwo", {
                        method: "POST",
                        body: formData,
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        alert("상담 신청이 정상적으로 접수되었습니다. 곧 연락드리겠습니다.");
                        form.reset();
                    } else {
                        alert("오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
                    }
                } catch (error) {
                    alert("네트워크 오류가 발생했습니다.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener("scroll", handleScroll);
                
                // Ensure Lucide icons are created
                const initIcons = () => {
                    if (window.lucide) {
                        window.lucide.createIcons();
                    }
                };
                
                initIcons();
                // Retry after a short delay to ensure everything is loaded
                setTimeout(initIcons, 1000);
                
                // Hide loading screen
                const loader = document.getElementById('loading-screen');
                const kakaoBtn = document.getElementById('kakao-chat-container');
                if (loader) {
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        setTimeout(() => {
                            loader.style.display = 'none';
                            if (kakaoBtn) {
                                kakaoBtn.style.opacity = '1';
                                kakaoBtn.style.pointerEvents = 'auto';
                            }
                        }, 500);
                    }, 500); // 0.5초 대기 후 페이드 아웃 시작
                }

                return () => window.removeEventListener("scroll", handleScroll);
            }, []);

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: "smooth" });

            return (
                <div className="bg-black text-white font-sans selection:bg-orange-500 selection:text-white min-h-screen">

                        <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${scrolled ? "bg-black/80 backdrop-blur-md border-b border-white/10 py-1.5 md:py-4" : "bg-transparent py-2 md:py-6"}`}>

                                <div className="flex items-center cursor-pointer" onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}>
                                    <img 
                                        src="https://img1.daumcdn.net/thumb/R1280x0/?scode=mtistory2&fname=https%3A%2F%2Fblog.kakaocdn.net%2Fdna%2FTM0lB%2FdJMcaiivdfU%2FAAAAAAAAAAAAAAAAAAAAAIBtCp2d_H35GcKyrIWU0yrsBS53evE1G5EkWcR4REet%2Fimg.jpg%3Fcredential%3DyqXZFxpELC7KVnFOS48ylbz2pIh7yKj8%26expires%3D1777561199%26allow_ip%3D%26allow_referer%3D%26signature%3DIS3wBm9uF0mIfLN8Gq3tmuSZuCE%253D" 
                                        alt="불향기 로고" 
                                        className="w-[140px] md:w-auto md:h-20 h-auto scale-80 md:scale-100"
                                        style={{ transform: "scale(0.8)", width: "140px", height: "auto" }}

                                    </motion.button>
                                </form>

                                <motion.a 
                                    href="tel:010-2208-5540"
                                    whileHover={{ scale: 1.02 }}

                                >
                                    <span className="text-2xl font-sans font-medium tracking-tighter">바로상담</span>
                                </motion.a>
                            </div>

                        <div className="lg:hidden flex items-center">

                                onClick={() => setIsMobileFormOpen(true)}

                            >
                                가맹문의 상담신청
                            </button>
                            <motion.a 
                                href="tel:010-2208-5540"
                                whileTap={{ scale: 0.95 }}
                                className="bg-white text-red-600 px-6 py-5 text-xl font-black border-l border-red-500"

                                바로상담
                            </motion.a>
                        </div>

                    {/* Mobile Form Modal/Overlay */}
                    <AnimatePresence>
                        {isMobileFormOpen && (
                            <motion.div 
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                className="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-6 lg:hidden"
                            >
                                <motion.div

                                    animate={{ scale: 1, y: 0 }}
                                    exit={{ scale: 0.9, y: 20 }}
                                    className="bg-white text-black w-full max-w-md rounded-[40px] p-8 relative"
                                >
                                    <button 
                                        onClick={() => setIsMobileFormOpen(false)}
                                        className="absolute top-6 right-6 text-black/40 hover:text-black"
                                    >
                                        <X className="w-8 h-8" />
                                    </button>
                                    
                                    <div className="text-center mb-8">
                                        <h3 className="text-3xl font-display mb-2">가맹문의 상담신청</h3>
                                        <p className="text-black/60 text-sm font-bold">정보를 입력하시면 전문가가 연락드립니다.</p>
                                    </div>

                                    <form className="space-y-4" onSubmit={async (e) => {
                                        await handleSubmit(e);
                                        setIsMobileFormOpen(false);
                                    }}>
                                        <input 
                                            name="name"
                                            type="text" 
                                            placeholder="성함" 
                                            required
                                            className="w-full bg-gray-100 border-none rounded-2xl p-4 font-bold" 
                                        />
                                        <input 
                                            name="phone"
                                            type="tel" 
                                            placeholder="연락처" 
                                            required
                                            className="w-full bg-gray-100 border-none rounded-2xl p-4 font-bold" 
                                        />
                                        <select name="location" required className="w-full bg-gray-100 border-none rounded-2xl p-4 font-bold appearance-none">
                                            <option value="">창업희망지역</option>
                                            <option value="seoul">서울/경기</option>
                                            <option value="busan">부산/경남</option>
                                            <option value="daegu">대구/경북</option>
                                            <option value="etc">기타지역</option>
                                        </select>
                                        
                                        <div className="flex items-center gap-2 px-2">
                                            <input type="checkbox" id="privacy-mobile" required className="accent-orange-600 w-4 h-4" />
                                            <label htmlFor="privacy-mobile" className="text-xs text-black/60 font-bold cursor-pointer">개인정보 취급방침 동의</label>
                                        </div>

                                        <button 
                                            disabled={isSubmitting}
                                            className="w-full bg-orange-600 text-white font-black py-5 rounded-2xl shadow-xl disabled:opacity-50"
                                        >
                                            {isSubmitting ? "처리 중..." : "무료 상담 신청하기"}
                                        </button>
                                    </form>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (error) {
            console.error("React rendering failed:", error);
            document.getElementById('loading-screen').innerHTML = `
                <div style="color: #FF4D00; font-family: sans-serif; text-align: center; padding: 20px;">
                    <h2>오류가 발생했습니다</h2>
                    <p>브라우저 콘솔을 확인하거나 인터넷 연결을 확인해주세요.</p>
                    <pre style="font-size: 0.8rem; color: #fff; background: #333; padding: 10px; border-radius: 5px;">${error.message}</pre>
                </div>
            `;
        }
    </script>
